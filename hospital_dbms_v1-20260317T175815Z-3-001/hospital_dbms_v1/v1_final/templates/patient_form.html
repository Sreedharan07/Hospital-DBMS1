{% extends 'base.html' %}
{% block title %}{{ action }} Patient — Hospital DBMS{% endblock %}
{% block page_title %}{{ action }} Patient{% endblock %}
{% block content %}
<div style="max-width:860px;">
<div class="card">
    <div class="card-header"><h3>Patient Information</h3><a href="{{ url_for('patients') }}" class="btn btn-outline btn-sm">← Back</a></div>
    <div class="card-body">
        <form method="POST">
            <div style="margin-bottom:24px;">
                <p style="font-size:0.78rem; text-transform:uppercase; letter-spacing:1px; color:#6b7280; margin-bottom:14px; font-weight:600;">Personal Details</p>
                <div class="form-grid">
                    <div class="form-group"><label>First Name *</label><input type="text" name="first_name" value="{{ patient.first_name if patient else '' }}" placeholder="e.g. John" aria-label="First Name" required></div>
                    <div class="form-group"><label>Last Name *</label><input type="text" name="last_name" value="{{ patient.last_name if patient else '' }}" placeholder="e.g. Smith" aria-label="Last Name" required></div>
                    <div class="form-group"><label>Date of Birth</label><input type="date" name="dob" value="{{ patient.dob if patient else '' }}" aria-label="Date of Birth"></div>
                    <div class="form-group"><label>Gender</label>
                        <select name="gender"><option value="">Select</option>
                            {% for g in ['Male', 'Female', 'Other'] %}
                            <option value="{{ g }}" {% if patient and patient.gender == g %}selected{% endif %}>{{ g }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group"><label>Blood Group</label>
                        <select name="blood_group"><option value="">Unknown</option>
                            {% for bg in ['A+','A-','B+','B-','AB+','AB-','O+','O-'] %}
                            <option value="{{ bg }}" {% if patient and patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
            <div style="margin-bottom:24px;">
                <p style="font-size:0.78rem; text-transform:uppercase; letter-spacing:1px; color:#6b7280; margin-bottom:14px; font-weight:600;">Contact Information</p>
                <div class="form-grid">
                    <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ patient.phone if patient else '' }}" placeholder="+1-555-0000" aria-label="Phone"></div>
                    <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ patient.email if patient else '' }}" placeholder="patient@email.com" aria-label="Email"></div>
                    <div class="form-group full"><label>Address</label><textarea name="address">{{ patient.address if patient else '' }}</textarea></div>
                </div>
            </div>
            <div style="margin-bottom:24px;">
                <p style="font-size:0.78rem; text-transform:uppercase; letter-spacing:1px; color:#6b7280; margin-bottom:14px; font-weight:600;">Medical & Emergency</p>
                <div class="form-grid">
                    <div class="form-group"><label>Emergency Contact Name</label><input type="text" name="emergency_contact" value="{{ patient.emergency_contact if patient else '' }}" placeholder="Full name" aria-label="Emergency Contact Name"></div>
                    <div class="form-group"><label>Emergency Phone</label><input type="text" name="emergency_phone" value="{{ patient.emergency_phone if patient else '' }}" placeholder="+1-555-0000" aria-label="Emergency Phone"></div>
                    <div class="form-group full"><label>Known Allergies</label><textarea name="allergies">{{ patient.allergies if patient else '' }}</textarea></div>
                </div>
            </div>
            <div style="display:flex; gap:12px;">
                <button type="submit" class="btn btn-primary">{{ action }} Patient</button>
                <a href="{{ url_for('patients') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
