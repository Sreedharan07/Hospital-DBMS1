{% extends 'base.html' %}
{% block title %}Schedule Appointment — Hospital DBMS{% endblock %}
{% block page_title %}Schedule Appointment{% endblock %}
{% block content %}
<div style="max-width:700px;">
<div class="card">
    <div class="card-header"><h3>New Appointment</h3><a href="{{ url_for('appointments') }}" class="btn btn-outline btn-sm">← Back</a></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-grid">
                <div class="form-group"><label>Patient *</label>
                    <select name="patient_id" required><option value="">Select patient</option>
                        {% for p in patients %}<option value="{{ p.id }}">{{ p.first_name }} {{ p.last_name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>Doctor *</label>
                    <select name="doctor_id" required><option value="">Select doctor</option>
                        {% for d in doctors %}<option value="{{ d.id }}">{{ d.full_name }} — {{ d.specialization }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>Date *</label><input type="date" name="appointment_date" required aria-label="Appointment Date"></div>
                <div class="form-group"><label>Time *</label><input type="time" name="appointment_time" required aria-label="Appointment Time"></div>
                <div class="form-group full"><label>Reason / Chief Complaint</label><textarea name="reason" placeholder="Brief description of reason for visit…"></textarea></div>
            </div>
            <div style="display:flex; gap:12px; margin-top:6px;">
                <button type="submit" class="btn btn-primary">Schedule Appointment</button>
                <a href="{{ url_for('appointments') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
<script>
document.querySelector('[name="appointment_date"]').min = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
